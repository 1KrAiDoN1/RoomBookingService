# Три шага: сборка бинарника → линтер → unit-тесты auth (auth_service_test.go).

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Сборка бинарника
        run: go build -v -o app ./cmd/app/main.go


      - name: Проверка линтера
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4
          args: --config=.golangci.yaml --verbose ./...

      - name: Тесты auth_service_test
        run: go test -v -count=1 -race ./internal/service -run '^TestAuthService'
