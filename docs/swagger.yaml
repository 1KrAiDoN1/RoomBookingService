info:
  contact: {}
paths:
  /auth/dummyLogin:
    post:
      consumes:
      - application/json
      description: Создает токен на основе переданной роли без пароля
      parameters:
      - description: Роль пользователя (admin, user)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internship_internal_models_dto_handler.DummyLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internship_internal_models_dto_handler.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_http-server_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_http-server_handler.InternalErrorResponse'
      summary: Тестовый логин
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Вход по email и паролю для получения токена
      parameters:
      - description: Креды пользователя
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internship_internal_models_dto_handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internship_internal_models_dto_handler.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_http-server_handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_http-server_handler.ErrorResponse'
      summary: Авторизация
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Создает нового пользователя в системе
      parameters:
      - description: Данные для регистрации
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internship_internal_models_dto_handler.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internship_internal_models_dto_handler.RegisterResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_http-server_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_http-server_handler.InternalErrorResponse'
      summary: Регистрация пользователя
      tags:
      - auth
  /bookings/{bookingID}/cancel:
    post:
      description: Отменяет бронирование по его ID
      parameters:
      - description: ID бронирования
        in: path
        name: bookingID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internship_internal_models_dto_handler.CancelBookingResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_http-server_handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_http-server_handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_http-server_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_http-server_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_http-server_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Отменить бронирование
      tags:
      - bookings
  /bookings/create:
    post:
      consumes:
      - application/json
      description: Бронирует конкретный слот для авторизованного пользователя
      parameters:
      - description: Данные бронирования
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internship_internal_models_dto_handler.CreateBookingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internship_internal_models_dto_handler.CreateBookingResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_http-server_handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_http-server_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_http-server_handler.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_http-server_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_http-server_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Создать бронирование
      tags:
      - bookings
  /bookings/list:
    get:
      description: Возвращает все бронирования с пагинацией
      parameters:
      - default: 1
        description: Номер страницы
        in: query
        name: page
        type: integer
      - default: 20
        description: Количество на странице
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internship_internal_models_dto_handler.ListBookingsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_http-server_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_http-server_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Список всех бронирований
      tags:
      - bookings
  /bookings/my:
    get:
      description: Возвращает список бронирований текущего пользователя
      produces:
      - application/json
      responses:
        "200":
          description: Массив бронирований
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/internship_internal_models_dto_handler.BookingData'
              type: array
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_http-server_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_http-server_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Мои бронирования
      tags:
      - bookings
  /rooms/{roomID}/schedule/create:
    post:
      consumes:
      - application/json
      description: Задает график работы для комнаты
      parameters:
      - description: ID комнаты
        in: path
        name: roomID
        required: true
        type: string
      - description: Данные расписания
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internship_internal_models_dto_handler.CreateScheduleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internship_internal_models_dto_handler.CreateScheduleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_http-server_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_http-server_handler.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_http-server_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_http-server_handler.InternalErrorResponse'
      summary: Создать расписание
      tags:
      - rooms
  /rooms/{roomID}/slots/list:
    get:
      description: Возвращает свободные слоты для комнаты на конкретную дату
      parameters:
      - description: ID комнаты
        in: path
        name: roomID
        required: true
        type: string
      - description: Дата в формате YYYY-MM-DD
        in: query
        name: date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internship_internal_models_dto_handler.ListSlotsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_http-server_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_http-server_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_http-server_handler.InternalErrorResponse'
      summary: Доступные слоты
      tags:
      - rooms
  /rooms/create:
    post:
      consumes:
      - application/json
      description: Добавляет новую комнату
      parameters:
      - description: Данные комнаты
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internship_internal_models_dto_handler.CreateRoomRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internship_internal_models_dto_handler.CreateRoomResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_http-server_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_http-server_handler.InternalErrorResponse'
      summary: Создать комнату
      tags:
      - rooms
  /rooms/list:
    get:
      description: Возвращает список всех доступных комнат
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internship_internal_models_dto_handler.ListRoomsResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_http-server_handler.InternalErrorResponse'
      summary: Список комнат
      tags:
      - rooms
swagger: "2.0"
