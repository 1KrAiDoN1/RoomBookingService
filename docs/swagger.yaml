definitions:
  internal_http-server_handler.ErrorResponse:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  internal_http-server_handler.InternalErrorResponse:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  internship_internal_models_dto_handler.BookingData:
    properties:
      conferenceLink:
        type: string
      createdAt:
        type: string
      slotId:
        type: string
      status:
        type: string
      userId:
        type: string
    type: object
  internship_internal_models_dto_handler.CancelBookingResponse:
    properties:
      booking:
        $ref: '#/definitions/internship_internal_models_dto_handler.BookingData'
    type: object
  internship_internal_models_dto_handler.CreateBookingRequest:
    properties:
      createConferenceLink:
        type: boolean
      slotId:
        type: string
    type: object
  internship_internal_models_dto_handler.CreateBookingResponse:
    properties:
      booking:
        $ref: '#/definitions/internship_internal_models_dto_handler.BookingData'
    type: object
  internship_internal_models_dto_handler.CreateRoomRequest:
    properties:
      capacity:
        type: integer
      description:
        type: string
      name:
        type: string
    type: object
  internship_internal_models_dto_handler.CreateRoomResponse:
    properties:
      room:
        $ref: '#/definitions/internship_internal_models_dto_handler.RoomData'
    type: object
  internship_internal_models_dto_handler.CreateScheduleRequest:
    properties:
      daysOfWeek:
        items:
          type: integer
        type: array
      endTime:
        type: string
      startTime:
        type: string
    type: object
  internship_internal_models_dto_handler.CreateScheduleResponse:
    properties:
      schedule:
        $ref: '#/definitions/internship_internal_models_dto_handler.ScheduleData'
    type: object
  internship_internal_models_dto_handler.DummyLoginRequest:
    properties:
      role:
        description: admin, user
        type: string
    type: object
  internship_internal_models_dto_handler.ListBookingsResponse:
    properties:
      bookings:
        items:
          $ref: '#/definitions/internship_internal_models_dto_handler.BookingData'
        type: array
      pagination:
        $ref: '#/definitions/internship_internal_models_dto_handler.PaginationQuery'
    type: object
  internship_internal_models_dto_handler.ListRoomsResponse:
    properties:
      rooms:
        items:
          $ref: '#/definitions/internship_internal_models_dto_handler.RoomData'
